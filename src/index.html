<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock, Paper, Scissors, Lizard, Spock</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
  <div class="container-fluid text-center">
    <h1 class="mt-5 propuesta">¿Juegas a <i class="fa-regular fa-hand-back-fist"></i><i class="fa-regular fa-hand"></i>
      <i class="fa-regular fa-hand-scissors"></i><i class="fa-regular fa-hand-lizard"></i><i
        class="fa-regular fa-hand-spock"></i>?
    </h1>
    <div class="container">
      <div class="card" style="width: 64rem center;">
        <img src="assets/img/piedra-papel-tijera-lagarto-spock.png" class="card-img-top" alt="..." width="200"
          height="600">
        <div class="card-body">
          <h3 class="card-title">Elige piedra, papel, tijera, lagarto, spock</h3>
          <h4 id="result" class="card-text"></h4>
          <button id="Piedra" class="btn btn-info"><i class="fa-regular fa-hand-back-fist"></i> Piedra</button>
          <button id="Papel" class="btn btn-info"><i class="fa-regular fa-hand"></i> Papel</button>
          <button id="Tijeras" class="btn btn-info"><i class="fa-regular fa-hand-scissors"></i> Tijeras</button>
          <button id="Lagarto" class="btn btn-info"><i class="fa-regular fa-hand-lizard"></i> Lagarto</button>
          <button id="Spock" class="btn btn-info"><i class="fa-regular fa-hand-spock"></i> Spock</button>

        </div>
      </div>


    </div>
    <div class="fixed-bottom p-4">
      Made with <i class="fa-solid fa-heart-pulse heart"></i> by Sareta_Pixel
    </div>
  </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
    integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK"
    crossorigin="anonymous"></script>
</body>

</html>
